<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGY Ratio Calculator</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: Arial; }
        .card { background: #1e293b; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .form-control, .form-select { background: #334155; color: white; border: 1px solid #475569; }
        .form-control:focus { background: #334155; color: white; }
        label { font-weight: 600; margin-top: 10px; }
        .btn-primary { background: #3b82f6; border: none; padding: 12px; font-weight: bold; }
        .btn-danger { background: #e74c3c; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #334155; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .install-btn { background: #10b981; color: white; padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px; margin: 0 auto;">
        <h1 style="text-align: center;">📊 PEGY Ratio Calculator</h1>
        
        <!-- Install Button -->
        <div style="text-align: center;">
            <button id="installBtn" class="install-btn">📲 Install App</button>
        </div>

        <!-- Input Form -->
        <div class="card">
            <h4>📝 Input Stock Data</h4>
            <form id="pegyForm">
                <div class="row">
                    <div class="col-md-6">
                        <label>Symbol *</label>
                        <input type="text" class="form-control" id="symbol" placeholder="e.g., CITYBANK" required>
                    </div>
                    <div class="col-md-3">
                        <label>EPS *</label>
                        <input type="number" step="0.01" class="form-control" id="eps" placeholder="0.00" required>
                    </div>
                    <div class="col-md-3">
                        <label>EPS Period *</label>
                        <select class="form-select" id="epsPeriod" required>
                            <option value="annual">Annual</option>
                            <option value="quarterly">Quarterly</option>
                        </select>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-md-4">
                        <label>Dividend Yield (%) *</label>
                        <input type="number" step="0.01" class="form-control" id="dividendYield" placeholder="5.60" required>
                    </div>
                    <div class="col-md-4">
                        <label>EPS Growth 3Yr (%)</label>
                        <input type="number" step="0.01" class="form-control" id="epsGrowth" placeholder="11.70">
                    </div>
                    <div class="col-md-4">
                        <label>Current Price *</label>
                        <input type="number" step="0.01" class="form-control" id="currentPrice" placeholder="25.00" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">📊 Calculate PEGY</button>
            </form>
        </div>

        <!-- Result Table -->
        <div class="card">
            <h4>📊 PEGY Rankings (Lowest = Best Value)</h4>
            <div style="overflow-x: auto;">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>EPS</th>
                            <th>Div Yield</th>
                            <th>Growth</th>
                            <th>P/E</th>
                            <th>PEG</th>
                            <th>PEGY</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9" style="text-align: center; color: #94a3b8;">No records yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }

        // Load records
        async function loadRecords() {
            const res = await fetch('/api/records');
            const records = await res.json();
            const tbody = document.getElementById('tableBody');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; color: #94a3b8;">No records yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = records.map(r => `
                <tr>
                    <td><strong>${r.symbol}</strong></td>
                    <td>${r.eps?.toFixed(2)}</td>
                    <td>${r.dividend_yield?.toFixed(2)}%</td>
                    <td>${r.eps_growth ? r.eps_growth.toFixed(2) + '%' : 'N/A'}</td>
                    <td>${r.pe_ratio?.toFixed(2)}</td>
                    <td>${r.peg_ratio ? r.peg_ratio.toFixed(2) : 'N/A'}</td>
                    <td><strong style="color: ${r.color};">${r.pegy_ratio ? r.pegy_ratio.toFixed(2) : 'N/A'}</strong></td>
                    <td><span style="background: ${r.color}; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px;">${r.status?.split(' - ')[0]}</span></td>
                    <td><button onclick="deleteRecord('${r._id}')" class="btn btn-danger btn-sm">🗑</button></td>
                </tr>
            `).join('');
        }

        // Submit form
        document.getElementById('pegyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '⏳ Calculating...';
            
            const data = {
                symbol: document.getElementById('symbol').value.toUpperCase(),
                eps: parseFloat(document.getElementById('eps').value),
                eps_period: document.getElementById('epsPeriod').value,
                dividend_yield: parseFloat(document.getElementById('dividendYield').value),
                eps_growth: parseFloat(document.getElementById('epsGrowth').value) || null,
                current_price: parseFloat(document.getElementById('currentPrice').value),
            };
            
            try {
                const res = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    document.getElementById('pegyForm').reset();
                    loadRecords();
                } else {
                    const err = await res.json();
                    alert('Error: ' + (err.detail || 'Failed'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '📊 Calculate PEGY';
        });

        // Delete record
        async function deleteRecord(id) {
            if (!confirm('Delete this record?')) return;
            const res = await fetch('/api/records/' + id, { method: 'DELETE' });
            if (res.ok) loadRecords();
        }

        // Initial load
        loadRecords();
    </script>
</body>
</html>
